name: Send LINE reminders

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  call-reminder-api:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminder endpoint
        env:
          CRON_SECRET: ${{ secrets.TSUKISOI_CRON_SECRET }}
          CRON_URL: https://www.clinic-tsukisoi.jp/api/cron/reminders
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::warning::TSUKISOI_CRON_SECRET is not set. Calling without Authorization header."
          fi

          if [ -n "$CRON_SECRET" ]; then
            http_code=$(curl --silent --show-error \
              --output reminder-response.json \
              --write-out "%{http_code}" \
              --header "Authorization: Bearer $CRON_SECRET" \
              "$CRON_URL")
          else
            http_code=$(curl --silent --show-error \
              --output reminder-response.json \
              --write-out "%{http_code}" \
              "$CRON_URL")
          fi

          echo "HTTP status: $http_code"
          echo "Response:"
          cat reminder-response.json
          echo

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi
